appId: com.nxtvibes.mobile
name: "19 - Change Password Screen"
tags:
  - profile
  - settings
  - password

---
# Pre-condition: User must be logged in with email/password (NOT Google)
# Test: Change Password form - verify fields, validation

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 5000

# Login
- tapOn:
    text: "Join the Journey"

- tapOn:
    text: "Sign In with Email"

- tapOn:
    text: "email@example.com"
- typeText: "webbusinesswithkiran@gmail.com"

- tapOn:
    text: "Enter password"
- typeText: "${TEST_PASSWORD}"

- tapOn:
    text: "Log In"

- assertVisible:
    text: "Plan Your Journey"

# Navigate to Profile → Settings → Change Password
- tapOn:
    description: "Profile"

- tapOn:
    text: "Settings"

- waitForAnimationToEnd:
    timeout: 3000

- scroll:
    direction: DOWN
    speed: 40

- tapOn:
    text: "Change Password"

- waitForAnimationToEnd:
    timeout: 3000

- assertVisible:
    text: "Change Password"

- takeScreenshot: "19_change_password_screen"

# Go back
- pressKey: Back

- takeScreenshot: "19_change_password_back"

