appId: com.nxtvibes.mobile
name: "08 - Forgot Password Flow"
tags:
  - auth
  - forgot-password

---
# Test: Forgot password flow - Request email reset, OTP screen appears

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Join the Journey"

# Go to login
- tapOn:
    text: "Sign In with Email"

- assertVisible:
    text: "Welcome Back"

# Tap "Forgot Password?"
- tapOn:
    text: "Forgot Password?"

# Forgot password - email entry screen
- assertVisible:
    text: "Reset Password"

- assertVisible:
    text: "Enter your email to receive a password reset verification code"

- assertVisible:
    text: "Send Reset Code"

- takeScreenshot: "08_forgot_password_email_screen"

# Test empty submit
- tapOn:
    text: "Send Reset Code"

- assertVisible:
    text: "Invalid email address."

- takeScreenshot: "08_forgot_password_validation_empty"

# Enter valid email
- tapOn:
    text: "email@example.com"
- typeText: "webbusinesswithkiran@gmail.com"

- takeScreenshot: "08_forgot_password_email_filled"

# Go back to login using Back button
- tapOn:
    text: "Back"

- assertVisible:
    text: "Welcome Back"

- takeScreenshot: "08_forgot_password_back_to_login"

