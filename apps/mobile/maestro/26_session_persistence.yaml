# This test verifies the session persistence works
- assertVisible:
    text: "Plan Your Journey"

- takeScreenshot: "26_already_logged_in_home"

# Verify tab bar is present
- assertVisible:
    text: "NxtVibes"

- takeScreenshot: "26_session_persisted"

