appId: com.tripzi.mobile
---
- tapOn: "AI Planner"
- assertVisible: "Where to next.*"
- tapOn: "This Weekend"
# Ensure we landed on chat UI
- assertVisible: "Tripzi AI"
- tapOn: "Ask Tripzi AI anything..."
- inputText: "Plan a budget trip for 2 days to a hill station."
- hideKeyboard
- tapOn:
    id: "ai-send-btn"
- tapOn: "arrow-back"
- assertVisible: "Where to next.*"
