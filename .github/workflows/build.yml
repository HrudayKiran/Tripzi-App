name: Build & Deploy NxtVibes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  # ─── Mobile: Lint & Test ────────────────────────────────────────────────────
  lint-and-test:
    name: Mobile — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --passWithNoTests

  # ─── Mobile: Android Preview Build ─────────────────────────────────────────
  build-android:
    name: Mobile — Android Preview Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./apps/mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./apps/mobile/package-lock.json

      - name: Setup Expo CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android (Preview APK)
        run: eas build --platform android --profile preview --non-interactive

  # ─── Mobile: Play Store Production Build ────────────────────────────────────
  build-production:
    name: Mobile — Production (Play Store)
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: ./apps/mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./apps/mobile/package-lock.json

      - name: Setup Expo CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android (Production AAB)
        run: eas build --platform android --profile production --non-interactive

      # Optional: Auto-submit to Play Store
      # - name: Submit to Play Store
      #   run: eas submit --platform android --profile production --non-interactive

  # ─── Phoenix API: Test & Deploy to Fly.io ───────────────────────────────────
  deploy-api:
    name: API — Deploy to Fly.io
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./apps/api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '26.2'
          elixir-version: '1.16.3'

      - name: Cache Elixir deps
        uses: actions/cache@v4
        with:
          path: apps/api/deps
          key: ${{ runner.os }}-mix-${{ hashFiles('apps/api/mix.lock') }}

      - name: Install Elixir dependencies
        run: mix deps.get --only prod

      - name: Run Elixir tests
        run: mix test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
